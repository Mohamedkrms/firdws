version: '3.8'

services:
  client:
    container_name: firdws-client-prod
    build:
      context: ./client
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
      - "443:443"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - server

  server:
    container_name: firdws-server-prod
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/quran_app
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - mongo

  mongo:
    container_name: firdws-mongo-prod
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
